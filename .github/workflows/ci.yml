name: ci

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
      - 'feature/**'
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package-name:
          - oh-my-akitagpb
          - oh-my-pactgpb
        node-version:
          - 20
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build --workspace ${{ matrix.package-name }}

      - name: Run tests
        run: npm test --workspace ${{ matrix.package-name }}

  smoke-pack-install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package-name:
          - oh-my-akitagpb
          - oh-my-pactgpb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run packed install smoke check
        run: npm run smoke:pack-install --workspace ${{ matrix.package-name }}
